<svg viewBox="0 0 640 520" width="800" height="650" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans Mono','Courier New',monospace">
  <!-- Pulled-down loot session directory — mockup terminal capture, not a screen recreation.
       Field names/values match write_meta_json() in funcs_main.sh exactly; the IP shown is
       the sanitized stock Hak5 default (172.16.42.1), not a real device. -->
  <rect width="640" height="520" rx="8" fill="rgb(24,24,26)"/>

  <!-- title bar -->
  <rect width="640" height="28" rx="8" fill="rgb(40,40,44)"/>
  <rect y="20" width="640" height="8" fill="rgb(40,40,44)"/>
  <circle cx="16" cy="14" r="5" fill="rgb(255,95,86)"/>
  <circle cx="34" cy="14" r="5" fill="rgb(255,189,46)"/>
  <circle cx="52" cy="14" r="5" fill="rgb(39,201,63)"/>
  <text x="320" y="18" font-size="11" text-anchor="middle" fill="rgb(170,170,170)">root@pager — loot pull</text>

  <g font-size="12">
    <text x="14" y="48"  fill="rgb(90,200,255)">$</text>
    <text x="30" y="48"  fill="rgb(210,210,210)">scp -r root@172.16.42.1:/root/loot/specpine ./loot/</text>

    <text x="14" y="66"  fill="rgb(90,200,255)">$</text>
    <text x="30" y="66"  fill="rgb(210,210,210)">ls -la loot/specpine/session_20260627_141503/</text>

    <g font-size="11.5" fill="rgb(150,235,170)">
      <text x="30" y="86">-rw-r--r--  1 root root    412 Jun 27 14:18 meta.json</text>
      <text x="30" y="102">-rw-r--r--  1 root root  18934 Jun 27 14:18 events.jsonl</text>
      <text x="30" y="118">-rw-r--r--  1 root root   2207 Jun 27 14:18 sweep_summary.csv</text>
      <text x="30" y="134">-rw-r--r--  1 root root  95350 Jun 27 14:14 screenshot_20260627_141402.bmp</text>
    </g>

    <text x="14" y="158" fill="rgb(90,200,255)">$</text>
    <text x="30" y="158" fill="rgb(210,210,210)">cat meta.json | python3 -m json.tool</text>

    <g font-size="11.5">
      <text x="30" y="180" fill="rgb(120,160,255)">{</text>
      <text x="46" y="196"><tspan fill="rgb(255,200,120)">"session_name"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"session_20260627_141503"</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="212"><tspan fill="rgb(255,200,120)">"ended_at"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"2026-06-27T14:18:42Z"</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="228"><tspan fill="rgb(255,200,120)">"mode"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"2.4"</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="244"><tspan fill="rgb(255,200,120)">"status"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"success"</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="260"><tspan fill="rgb(255,200,120)">"band"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"2.4"</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="276"><tspan fill="rgb(255,200,120)">"device"</tspan><tspan fill="rgb(210,210,210)">: {</tspan><tspan fill="rgb(255,200,120)">"name"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"Wi-Spy DBx"</tspan><tspan fill="rgb(210,210,210)">, </tspan><tspan fill="rgb(255,200,120)">"present"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(255,150,150)">true</tspan><tspan fill="rgb(210,210,210)">},</tspan></text>
      <text x="46" y="292"><tspan fill="rgb(255,200,120)">"freq_range_khz"</tspan><tspan fill="rgb(210,210,210)">: {</tspan><tspan fill="rgb(255,200,120)">"start"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"2400000"</tspan><tspan fill="rgb(210,210,210)">, </tspan><tspan fill="rgb(255,200,120)">"end"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"2483500"</tspan><tspan fill="rgb(210,210,210)">},</tspan></text>
      <text x="46" y="308"><tspan fill="rgb(255,200,120)">"settings"</tspan><tspan fill="rgb(210,210,210)">: {</tspan><tspan fill="rgb(255,200,120)">"stall_timeout"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(180,180,255)">30</tspan><tspan fill="rgb(210,210,210)">, </tspan><tspan fill="rgb(255,200,120)">"noloot"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(255,150,150)">false</tspan><tspan fill="rgb(210,210,210)">},</tspan></text>
      <text x="46" y="324"><tspan fill="rgb(255,200,120)">"gps"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">""</tspan><tspan fill="rgb(210,210,210)">,</tspan></text>
      <text x="46" y="340"><tspan fill="rgb(255,200,120)">"app_version"</tspan><tspan fill="rgb(210,210,210)">: </tspan><tspan fill="rgb(150,235,170)">"1.0"</tspan></text>
      <text x="30" y="356" fill="rgb(120,160,255)">}</text>
    </g>

    <text x="14" y="382" fill="rgb(90,200,255)">$</text>
    <text x="30" y="382" fill="rgb(210,210,210)">head -3 sweep_summary.csv</text>
    <g font-size="11" fill="rgb(180,180,180)">
      <text x="30" y="400">timestamp,band,min_dbm,max_dbm,avg_dbm</text>
      <text x="30" y="416">2026-06-27T14:14:02Z,2.4,-94,-38,-71.2</text>
      <text x="30" y="432">2026-06-27T14:14:02Z,2.4,-93,-41,-72.0</text>
    </g>

    <text x="14" y="456" fill="rgb(90,200,255)">$</text>
    <text x="30" y="456" fill="rgb(210,210,210)">file screenshot_20260627_141402.bmp</text>
    <text x="30" y="474" font-size="11" fill="rgb(180,180,180)">screenshot_20260627_141402.bmp: PC bitmap, Windows 3.x format, 480 x 222 x 24</text>
  </g>

  <text x="14" y="500" font-size="10.5" fill="rgb(120,120,120)">status: started / success / failed / cancelled — failed and cancelled sessions are always kept</text>
</svg>
