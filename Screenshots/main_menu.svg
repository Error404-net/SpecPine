<svg viewBox="0 0 480 222" width="960" height="444" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans Mono','Courier New',monospace">
  <!-- SpecPine HUD main menu — recreated from specpine_hud.py draw_menu().
       Mockup, not a captured framebuffer dump (see README "Screenshots" note). -->
  <defs>
    <clipPath id="screen"><rect x="0" y="0" width="480" height="222"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="480" height="222" fill="rgb(0,8,4)"/>

  <g clip-path="url(#screen)">
    <!-- faint horizontal grid -->
    <g stroke="rgb(0,35,18)" stroke-width="1">
      <line x1="0" y1="24" x2="480" y2="24"/>
      <line x1="0" y1="48" x2="480" y2="48"/>
      <line x1="0" y1="72" x2="480" y2="72"/>
      <line x1="0" y1="96" x2="480" y2="96"/>
      <line x1="0" y1="120" x2="480" y2="120"/>
      <line x1="0" y1="144" x2="480" y2="144"/>
      <line x1="0" y1="168" x2="480" y2="168"/>
      <line x1="0" y1="192" x2="480" y2="192"/>
      <line x1="0" y1="216" x2="480" y2="216"/>
    </g>

    <!-- header bar -->
    <rect x="0" y="0" width="480" height="30" fill="rgb(0,20,10)"/>
    <text x="8" y="20" font-size="16" font-weight="bold" letter-spacing="2" fill="rgb(255,180,0)">SPECPINE</text>
    <text x="455" y="20" font-size="13" text-anchor="end" fill="rgb(0,80,40)">v1.0</text>
    <rect x="0" y="28" width="480" height="2" fill="rgb(0,220,100)"/>

    <!-- menu items -->
    <text x="8" y="48" font-size="14" fill="rgb(0,220,100)">&gt; 2.4GHZ WATERFALL</text>
    <text x="8" y="86" font-size="14" fill="rgb(0,80,40)">&#160;&#160;5GHZ WATERFALL</text>
    <text x="8" y="124" font-size="14" fill="rgb(0,80,40)">&#160;&#160;NFO</text>

    <!-- cursor selection box around active row -->
    <rect x="2" y="34" width="476" height="22" fill="none" stroke="rgb(0,220,100)" stroke-width="1" opacity="0.35"/>

    <!-- footer bar -->
    <rect x="0" y="202" width="480" height="20" fill="rgb(0,20,10)"/>
    <rect x="0" y="202" width="480" height="2" fill="rgb(0,220,100)"/>
    <text x="240" y="216" font-size="11" text-anchor="middle" fill="rgb(0,80,40)">UP/DN:NAV  OK:SEL  HOLD.B:EXIT</text>

    <!-- 1px border -->
    <rect x="0.5" y="0.5" width="479" height="221" fill="none" stroke="rgb(0,80,40)" stroke-width="1"/>
  </g>

  <!-- subtle CRT scanlines -->
  <g opacity="0.25">
    <g stroke="rgb(7,11,19)" stroke-width="1">
      <line x1="0" y1="34" x2="480" y2="34"/><line x1="0" y1="38" x2="480" y2="38"/>
      <line x1="0" y1="42" x2="480" y2="42"/><line x1="0" y1="58" x2="480" y2="58"/>
      <line x1="0" y1="62" x2="480" y2="62"/><line x1="0" y1="66" x2="480" y2="66"/>
      <line x1="0" y1="96" x2="480" y2="96"/><line x1="0" y1="100" x2="480" y2="100"/>
      <line x1="0" y1="104" x2="480" y2="104"/><line x1="0" y1="134" x2="480" y2="134"/>
      <line x1="0" y1="138" x2="480" y2="138"/><line x1="0" y1="142" x2="480" y2="142"/>
    </g>
  </g>
</svg>
