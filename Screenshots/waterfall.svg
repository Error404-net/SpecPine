<svg viewBox="0 0 480 222" width="960" height="444" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans Mono','Courier New',monospace">
  <!-- Graphical waterfall scan — recreated from spectools_waterfall_fb.py build_static()/draw_status().
       Mockup, not a captured framebuffer dump (see README "Screenshots" note). 2.4GHz band shown. -->
  <defs>
    <clipPath id="screen2"><rect x="0" y="0" width="480" height="222"/></clipPath>
    <linearGradient id="legendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgb(0,0,0)"/>
      <stop offset="15%"  stop-color="rgb(0,0,160)"/>
      <stop offset="27.5%" stop-color="rgb(0,120,220)"/>
      <stop offset="37.5%" stop-color="rgb(0,220,80)"/>
      <stop offset="50%"  stop-color="rgb(200,220,0)"/>
      <stop offset="62.5%" stop-color="rgb(255,140,0)"/>
      <stop offset="77.5%" stop-color="rgb(255,20,0)"/>
      <stop offset="100%" stop-color="rgb(255,96,104)"/>
    </linearGradient>
    <radialGradient id="hotspot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgb(255,150,0)" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="rgb(220,40,20)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="rgb(10,16,28)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="222" fill="rgb(10,16,28)"/>

  <g clip-path="url(#screen2)">
    <!-- waterfall noise-floor texture (sweep history rows) -->
    <g>
      <rect x="0" y="20" width="480" height="162" fill="rgb(6,10,20)"/>
      <g opacity="0.5">
        <rect x="0" y="24" width="480" height="2" fill="rgb(0,0,60)"/>
        <rect x="0" y="40" width="480" height="2" fill="rgb(0,10,70)"/>
        <rect x="0" y="58" width="480" height="2" fill="rgb(0,0,50)"/>
        <rect x="0" y="74" width="480" height="2" fill="rgb(0,15,80)"/>
        <rect x="0" y="92" width="480" height="2" fill="rgb(0,5,55)"/>
        <rect x="0" y="108" width="480" height="2" fill="rgb(0,12,70)"/>
        <rect x="0" y="126" width="480" height="2" fill="rgb(0,0,45)"/>
        <rect x="0" y="142" width="480" height="2" fill="rgb(0,18,85)"/>
        <rect x="0" y="160" width="480" height="2" fill="rgb(0,8,60)"/>
        <rect x="0" y="176" width="480" height="2" fill="rgb(0,0,40)"/>
      </g>
      <!-- AP activity hotspots at Wi-Fi channels 1 / 6 / 11 -->
      <ellipse cx="69"  cy="60"  rx="22" ry="60" fill="url(#hotspot)"/>
      <ellipse cx="212" cy="100" rx="26" ry="70" fill="url(#hotspot)"/>
      <ellipse cx="356" cy="40"  rx="18" ry="45" fill="url(#hotspot)"/>
    </g>

    <!-- title bar -->
    <rect x="0" y="0" width="480" height="15" fill="rgb(18,30,52)"/>
    <text x="4" y="11" font-size="9" fill="rgb(255,255,255)">SpecTools Waterfall</text>
    <text x="300" y="11" font-size="9" fill="rgb(0,200,160)">Wi-Spy DBx</text>
    <rect x="0" y="14" width="480" height="1" fill="rgb(0,200,160)"/>

    <!-- channel tick marks + dotted guides -->
    <g>
      <rect x="68"  y="15" width="3" height="5" fill="rgb(0,200,160)"/>
      <rect x="211" y="15" width="3" height="5" fill="rgb(0,200,160)"/>
      <rect x="355" y="15" width="3" height="5" fill="rgb(0,200,160)"/>
      <g stroke="rgb(100,110,120)" stroke-width="1" stroke-dasharray="1,3" opacity="0.6">
        <line x1="69"  y1="20" x2="69"  y2="181"/>
        <line x1="212" y1="20" x2="212" y2="181"/>
        <line x1="356" y1="20" x2="356" y2="181"/>
      </g>
      <text x="63"  y="200" font-size="8" fill="rgb(0,200,160)">1</text>
      <text x="206" y="200" font-size="8" fill="rgb(0,200,160)">6</text>
      <text x="349" y="200" font-size="8" fill="rgb(0,200,160)">11</text>
    </g>

    <!-- dBm gradient legend -->
    <rect x="0" y="182" width="480" height="10" fill="url(#legendGrad)"/>
    <text x="26"  y="200" font-size="7" fill="rgb(100,110,120)">-95</text>
    <text x="115" y="200" font-size="7" fill="rgb(100,110,120)">-80</text>
    <text x="176" y="200" font-size="7" fill="rgb(100,110,120)">-70</text>
    <text x="236" y="200" font-size="7" fill="rgb(100,110,120)">-60</text>
    <text x="295" y="200" font-size="7" fill="rgb(100,110,120)">-50</text>
    <text x="355" y="200" font-size="7" fill="rgb(100,110,120)">-40</text>

    <!-- freq range labels -->
    <text x="2"   y="192" font-size="8" fill="rgb(100,110,120)">2400MHz</text>
    <text x="436" y="192" font-size="8" fill="rgb(100,110,120)">2483MHz</text>

    <!-- status bar -->
    <rect x="0" y="205" width="480" height="17" fill="rgb(18,30,52)"/>
    <rect x="0" y="205" width="480" height="1" fill="rgb(0,200,160)"/>
    <text x="4"   y="217" font-size="9" fill="rgb(255,255,255)">Sweeps:142</text>
    <text x="160" y="217" font-size="9" fill="rgb(0,200,160)">Peak:-42dBm</text>
    <text x="340" y="217" font-size="9" fill="rgb(100,110,120)">SCANNING</text>
  </g>

  <rect x="0.5" y="0.5" width="479" height="221" fill="none" stroke="rgb(0,80,40)" stroke-width="1"/>
</svg>
